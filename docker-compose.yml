version: '3.8'

services:
  backend:
    build: ./backend
    container_name: devgap-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: devgap-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: devgap-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
